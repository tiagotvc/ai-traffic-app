services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-traffic-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_traffic
    volumes:
      - ai_traffic_pg:/var/lib/postgresql/data

volumes:
  ai_traffic_pg:
